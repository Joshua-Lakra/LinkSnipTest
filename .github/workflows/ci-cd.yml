name: LinkSnip CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: linksnip
  DOCKER_HUB_REPO: ${{ secrets.DOCKER_HUB_USERNAME }}/linksnip

jobs:
  # ── Stage 1: Test ────────────────────────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/

  # ── Stage 2: Build & Push Docker Image ──────────────────────────────────────
  build:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_HUB_REPO }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
            type=raw,value=${{ github.run_number }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Stage 3: Deploy to Kubernetes ───────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1.8.0
        with:
          cluster_name: linksnip-cluster

      - name: Load Docker image into kind
        run: |
          # Pull the image we just built
          docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/linksnip:${{ github.run_number }}
          # Load it into kind cluster
          kind load docker-image ${{ secrets.DOCKER_HUB_USERNAME }}/linksnip:${{ github.run_number }} --name linksnip-cluster

      - name: Update image in deployment
        run: |
          sed -i "s|DOCKER_HUB_USERNAME|${{ secrets.DOCKER_HUB_USERNAME }}|g" k8s/deployment.yaml
          sed -i "s|IMAGE_TAG|${{ github.run_number }}|g" k8s/deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/redis-deployment.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
      - name: Debug - Check pod status
        if: always()
        run: |
          echo "=== Pods ==="
          kubectl get pods -n linksnip
          echo ""
          echo "=== Pod Details ==="
          kubectl describe pods -n linksnip
          echo ""
          echo "=== Pod Logs ==="
          kubectl logs -n linksnip -l app=linksnip-app --tail=50 || true
          echo ""
          echo "=== Events ==="
          kubectl get events -n linksnip --sort-by='.lastTimestamp'
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/linksnip-app -n linksnip --timeout=300s || {
            echo "Rollout failed. Checking pod status..."
            kubectl get pods -n linksnip
            kubectl describe pods -n linksnip
            kubectl logs -n linksnip -l app=linksnip-app --tail=100 || true
            exit 1
          }

      - name: Verify deployment
        run: |
          kubectl get pods -n linksnip
          kubectl get services -n linksnip